version: '3.8'

services:
  # --------------------------------------------------------
  # 1. PostgreSQL (with pgvector for VectorDB & Core DB)
  # --------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    container_name: dsp-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${CORE_DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker-init/init-dbs.sql:/docker-entrypoint-initdb.d/init-dbs.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --------------------------------------------------------
  # 2. Redis (Caching & Queues)
  # --------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: dsp-redis
    restart: always
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --------------------------------------------------------
  # 3. Kafka (Event Streaming - KRaft Mode)
  # --------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: dsp-kafka
    restart: always
    ports:
      - "${KAFKA_BROKER_PORT}:9092"
      - "${KAFKA_CONTROLLER_PORT}:9093"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:${KAFKA_BROKER_PORT}'
      KAFKA_LISTENERS: 'PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:${KAFKA_BROKER_PORT}'
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      CLUSTER_ID: 'ciWo7IWazngRchmPES6q5A=='
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:${KAFKA_BROKER_PORT} > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # --------------------------------------------------------
  # 4. Elasticsearch (CQRS & Text Search)
  # --------------------------------------------------------
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.2
    container_name: dsp-elasticsearch
    restart: always
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
    ports:
      - "${ELASTIC_PORT}:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -u elastic:$${ELASTIC_PASSWORD} http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s

  # --------------------------------------------------------
  # 5. Kafka UI
  # --------------------------------------------------------
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: dsp-kafka-ui
    ports:
      - "${KAFKA_UI_PORT}:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=local
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:29092
      - AUTH_TYPE=LOGIN_FORM
      - SPRING_SECURITY_USER_NAME=${KAFKA_UI_USER}
      - SPRING_SECURITY_USER_PASSWORD=${KAFKA_UI_PASSWORD}
    depends_on:
      kafka:
        condition: service_healthy

  # --------------------------------------------------------
  # 6. RedisInsight
  # --------------------------------------------------------
  redisinsight:
    image: redis/redisinsight:latest
    container_name: dsp-redisinsight
    depends_on:
      redis:
        condition: service_healthy

  # --------------------------------------------------------
  # 7. Kibana (Elasticsearch UI)
  # --------------------------------------------------------
  kibana:
    image: docker.elastic.co/kibana/kibana:8.10.2
    container_name: dsp-kibana
    ports:
      - "${KIBANA_PORT}:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=elastic
      - ELASTICSEARCH_PASSWORD=${ELASTIC_PASSWORD}
    depends_on:
      elasticsearch:
        condition: service_healthy

  # --------------------------------------------------------
  # 8. Local API Gateway (Nginx)
  # --------------------------------------------------------
  api-gateway:
    image: nginx:alpine
    container_name: dsp-api-gateway
    restart: always
    ports:
      - "${API_GATEWAY_PORT}:80"
      - "${REDISINSIGHT_PORT}:8001"
      - "${PROMETHEUS_PORT}:9090"
    volumes:
      - ./docker-init/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker-init/.htpasswd:/etc/nginx/.htpasswd:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # --------------------------------------------------------
  # 9. Prometheus (Metrics Collector)
  # --------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: dsp-prometheus
    volumes:
      - ./docker-init/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    restart: always

  # --------------------------------------------------------
  # 10. Grafana (Metrics Dashboard)
  # --------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: dsp-grafana
    ports:
      - "${GRAFANA_PORT}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker-init/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    restart: always

  # --------------------------------------------------------
  # 11. Node Exporter (Host Metrics)
  # --------------------------------------------------------
  node-exporter:
    image: prom/node-exporter:latest
    container_name: dsp-node-exporter
    ports:
      - "${NODE_EXPORTER_PORT}:9100"
    restart: always


  # --------------------------------------------------------
  # 12. Postgres Exporter
  # --------------------------------------------------------
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: dsp-postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${CORE_DB_NAME}?sslmode=disable"
    ports:
      - "${POSTGRES_EXPORTER_PORT}:9187"
    depends_on:
      - postgres
    restart: always

  # --------------------------------------------------------
  # 13. Redis Exporter
  # --------------------------------------------------------
  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: dsp-redis-exporter
    environment:
      REDIS_ADDR: "redis:6379"
    ports:
      - "${REDIS_EXPORTER_PORT}:9121"
    depends_on:
      - redis
    restart: always

  # --------------------------------------------------------
  # 14. Kafka Exporter
  # --------------------------------------------------------
  kafka-exporter:
    image: danielqsj/kafka-exporter:latest
    container_name: dsp-kafka-exporter
    command: ["--kafka.server=kafka:29092"]
    ports:
      - "${KAFKA_EXPORTER_PORT}:9308"
    depends_on:
      - kafka
    restart: always

  # --------------------------------------------------------
  # 15. Elasticsearch Exporter
  # --------------------------------------------------------
  elasticsearch-exporter:
    image: prometheuscommunity/elasticsearch-exporter:latest
    container_name: dsp-elasticsearch-exporter
    command: ["--es.uri=http://elasticsearch:9200"]
    ports:
      - "${ELASTICSEARCH_EXPORTER_PORT}:9114"
    depends_on:
      - elasticsearch
    restart: always

  # --------------------------------------------------------
  # 16. Nginx Exporter
  # --------------------------------------------------------
  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:latest
    container_name: dsp-nginx-exporter
    command: ["-nginx.scrape-uri=http://api-gateway:80/stub_status"]
    ports:
      - "${NGINX_EXPORTER_PORT}:9113"
    depends_on:
      - api-gateway
    restart: always

volumes:
  postgres_data:
  redis_data:
  kafka_data:
  es_data:
  prometheus_data:
  grafana_data:
