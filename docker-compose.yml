version: '3.8'

services:
  # --------------------------------------------------------
  # 1. PostgreSQL (with pgvector for VectorDB & Core DB)
  # --------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    container_name: dsp-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-root}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-rootpassword}
      POSTGRES_DB: ${CORE_DB_NAME:-core_db}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker-init/init-dbs.sql:/docker-entrypoint-initdb.d/init-dbs.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --------------------------------------------------------
  # 2. Redis (Caching & Queues)
  # --------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: dsp-redis
    restart: always
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --------------------------------------------------------
  # 3. Kafka (Event Streaming - KRaft Mode)
  # --------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: dsp-kafka
    restart: always
    ports:
      - "${KAFKA_BROKER_PORT:-9092}:9092"
      - "${KAFKA_CONTROLLER_PORT:-9093}:9093"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:${KAFKA_BROKER_PORT:-9092}'
      KAFKA_LISTENERS: 'PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:${KAFKA_BROKER_PORT:-9092}'
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      CLUSTER_ID: 'ciWo7IWazngRchmPES6q5A=='
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:${KAFKA_BROKER_PORT:-9092} > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # --------------------------------------------------------
  # 4. Elasticsearch (CQRS & Text Search)
  # --------------------------------------------------------
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.2
    container_name: dsp-elasticsearch
    restart: always
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-changeme}
    ports:
      - "${ELASTIC_PORT:-9200}:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s

  # --------------------------------------------------------
  # 5. Kafka UI
  # --------------------------------------------------------
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: dsp-kafka-ui
    ports:
      - "8080:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=local
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:29092
    depends_on:
      kafka:
        condition: service_healthy

  # --------------------------------------------------------
  # 6. RedisInsight
  # --------------------------------------------------------
  redisinsight:
    image: redis/redisinsight:latest
    container_name: dsp-redisinsight
    ports:
      - "8001:5540"
    depends_on:
      redis:
        condition: service_healthy

  # --------------------------------------------------------
  # 7. Kibana (Elasticsearch UI)
  # --------------------------------------------------------
  kibana:
    image: docker.elastic.co/kibana/kibana:8.10.2
    container_name: dsp-kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      elasticsearch:
        condition: service_healthy

  # --------------------------------------------------------
  # 8. Local API Gateway (Nginx)
  # --------------------------------------------------------
  api-gateway:
    image: nginx:alpine
    container_name: dsp-api-gateway
    restart: always
    ports:
      - "8000:80"
    volumes:
      - ./docker-init/nginx.conf:/etc/nginx/nginx.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres_data:
  redis_data:
  kafka_data:
  es_data:
