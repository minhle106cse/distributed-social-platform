events {
    worker_connections 1024;
}

http {
    # Logging configuration
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Basic Settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Upstream Definitions
    # Dùng host.docker.internal để Nginx trong Docker gọi được ra các cổng ở máy Host (Windows)
    upstream auth_service {
        server host.docker.internal:4001;
    }

    upstream core_api {
        server host.docker.internal:4002;
    }

    server {
        listen 80;
        server_name localhost;

        # 1. Định tuyến cho Auth Service
        # Bao gồm các module: auth, users, roles, permissions
        location ~ ^/api/v1/(auth|users|roles|permissions)(/|$) {
            proxy_pass http://auth_service;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # 2. Định tuyến cho Core API (Cortex domains)
        # Bao gồm các module: orgs, spaces, knowledge, search, ai, credits, reputation, feed, notifications
        location ~ ^/api/v1/(orgs|spaces|knowledge|search|ai|credits|reputation|feed|notifications)(/|$) {
            proxy_pass http://core_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # 3. Default Health Check
        location / {
            return 200 'API Gateway is running. Use /api/auth or /api/core.';
            add_header Content-Type text/plain;
        }

        # 4. Expose metrics for Prometheus
        location /stub_status {
            stub_status;
            allow all;
        }
    }

    # Secure Proxy for RedisInsight
    server {
        listen 8001;
        server_name localhost;

        auth_basic "Restricted Access";
        auth_basic_user_file /etc/nginx/.htpasswd;

        location / {
            proxy_pass http://redisinsight:5540;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }
    }

    # Secure Proxy for Prometheus
    server {
        listen 9090;
        server_name localhost;

        auth_basic "Restricted Access";
        auth_basic_user_file /etc/nginx/.htpasswd;

        location / {
            proxy_pass http://prometheus:9090;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }
    }
}
