events {
    worker_connections 1024;
}

http {
    # Logging configuration
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Basic Settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Upstream Definitions
    # Dùng host.docker.internal để Nginx trong Docker gọi được ra các cổng ở máy Host (Windows)
    upstream auth_service {
        server host.docker.internal:3000;
    }

    upstream core_api {
        server host.docker.internal:3001;
    }

    server {
        listen 80;
        server_name localhost;

        # 1. Định tuyến cho Auth Service
        location /api/auth/ {
            proxy_pass http://auth_service;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            
            # Ghi đè đường dẫn nếu auth-service không chứa tiền tố /api/auth
            # Trường hợp auth-service nhận thẳng root /, dùng rewrite:
            # rewrite ^/api/auth/(.*) /$1 break;
        }

        # 2. Định tuyến cho Core API
        location /api/core/ {
            proxy_pass http://core_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # 3. Default Health Check
        location / {
            return 200 'API Gateway is running. Use /api/auth or /api/core.';
            add_header Content-Type text/plain;
        }
    }
}
